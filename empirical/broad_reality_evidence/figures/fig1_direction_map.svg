<svg xmlns="http://www.w3.org/2000/svg" width="980" height="404" viewBox="0 0 980 404" font-family="Helvetica, Arial, sans-serif"><rect width="980" height="404" fill="#fcfcfb"/><text x="36.0" y="38.0" font-size="18" fill="#0b0b0b" text-anchor="start" font-weight="bold" font-family="Helvetica, Arial, sans-serif">Direction map: source-adjudicated sign compatibility by channel</text><text x="36.0" y="60.0" font-size="12" fill="#52514e" text-anchor="start" font-weight="normal" font-family="Helvetica, Arial, sans-serif">Bars are independent study-cluster counts (not effect sizes). Colour = agreement with the channel's model-expected sign.</text><text x="36.0" y="76.0" font-size="12" fill="#8a8983" text-anchor="start" font-weight="normal" font-family="Helvetica, Arial, sans-serif">Fixed corpus; primary-sign records only. A sign is read only where a route×trait×outcome×design cell reaches k≥3 clusters.</text><line x1="172.0" y1="86.0" x2="172.0" y2="324.0" stroke="#e8e7e2" stroke-width="1"/><text x="172.0" y="340.0" font-size="11" fill="#8a8983" text-anchor="middle" font-weight="normal" font-family="Helvetica, Arial, sans-serif">0</text><line x1="248.0" y1="86.0" x2="248.0" y2="324.0" stroke="#e8e7e2" stroke-width="1"/><text x="248.0" y="340.0" font-size="11" fill="#8a8983" text-anchor="middle" font-weight="normal" font-family="Helvetica, Arial, sans-serif">1</text><line x1="324.0" y1="86.0" x2="324.0" y2="324.0" stroke="#e8e7e2" stroke-width="1"/><text x="324.0" y="340.0" font-size="11" fill="#8a8983" text-anchor="middle" font-weight="normal" font-family="Helvetica, Arial, sans-serif">2</text><line x1="400.0" y1="86.0" x2="400.0" y2="324.0" stroke="#e8e7e2" stroke-width="1"/><text x="400.0" y="340.0" font-size="11" fill="#8a8983" text-anchor="middle" font-weight="normal" font-family="Helvetica, Arial, sans-serif">3</text><line x1="476.0" y1="86.0" x2="476.0" y2="324.0" stroke="#e8e7e2" stroke-width="1"/><text x="476.0" y="340.0" font-size="11" fill="#8a8983" text-anchor="