name: Probe public trait and antagonist-data gates

on:
  pull_request:
    paths:
      - "scripts/probe_bien_wol_leaf_coverage.R"
      - "scripts/probe_globi_antagonist_contract.py"
      - "scripts/probe_wol_orientation.py"
      - ".github/workflows/probe-bien-leaf-feasibility.yml"
  workflow_dispatch:

jobs:
  bien_leaf_trait_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install and verify current RBIEN client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpq-dev
          Rscript -e 'install.packages(c("jsonlite", "RBIEN"), repos="https://cloud.r-project.org")'
          Rscript -e 'stopifnot(requireNamespace("RBIEN", quietly=TRUE)); required <- c("BIEN_trait_list", "BIEN_trait_traitbyspecies"); stopifnot(all(required %in% getNamespaceExports("RBIEN"))); cat("RBIEN", as.character(packageVersion("RBIEN")), "ready\n")'

      - name: Recover Web of Life plant-side orientation
        run: python scripts/probe_wol_orientation.py artifacts/orientation

      - name: Screen direct RBIEN leaf-trait coverage
        run: Rscript scripts/probe_bien_wol_leaf_coverage.R artifacts/orientation artifacts/bien_leaf

      - uses: actions/upload-artifact@v4
        with:
          name: bien-leaf-feasibility
          path: artifacts/
          if-no-files-found: error

  globi_antagonist_network_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test GloBI against the sampled-network contract
        run: python scripts/probe_globi_antagonist_contract.py artifacts/globi_antagonist

      - uses: actions/upload-artifact@v4
        with:
          name: globi-antagonist-contract
          path: artifacts/
          if-no-files-found: error
