name: Part B support pipeline

# Reproduces the Part B analysis plus the C0 evidence-capacity audit in CI. The
# artifact keeps directional-only and quantitative evidence separate instead of
# creating an all-route pooled estimate by hand.

on:
  pull_request:
    paths:
      - "trait_architecture/part_b_*.py"
      - "trait_architecture/broad_meta_analysis.py"
      - "trait_architecture/robustness.py"
      - "scripts/run_part_b_support.py"
      - "configs/part_b_*.json"
      - "empirical/broad_reality_evidence/part_b_arrow_*.csv"
      - "tests/test_part_b_*.py"
      - ".github/workflows/part-b-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Part B tests
        run: >
          python -m pytest -q
          tests/test_part_b_support.py
          tests/test_part_b_moderator.py
          tests/test_part_b_arrow_evidence.py
          tests/test_part_b_evidence_capacity.py
          tests/test_part_b_pipeline.py

      - name: Reproduce the layered Part B pipeline
        run: |
          python scripts/run_part_b_support.py \
            empirical/broad_reality_evidence/broad_route_records.csv \
            empirical/broad_reality_evidence/part_b_arrow_effects.csv \
            empirical/broad_reality_evidence/part_b_arrow_strata.csv \
            configs/part_b_moderator_hypotheses.json \
            configs/part_b_break_even_scenarios.json \
            artifacts/part_b_support

      - uses: actions/upload-artifact@v4
        with:
          name: part-b-support
          path: artifacts/part_b_support/
          if-no-files-found: error
