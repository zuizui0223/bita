name: Probe BIEN-Web of Life attraction coverage

on:
  pull_request:
    paths:
      - "scripts/probe_bien_wol_attraction_coverage.R"
      - "scripts/probe_wol_orientation.py"
      - ".github/workflows/probe-bien-wol-attraction-coverage.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::BIEN
            any::jsonlite
          cache-version: 1
      - name: Recover Web of Life plant-side orientation
        run: python scripts/probe_wol_orientation.py artifacts/orientation
      - name: Test BIEN attraction-proxy coverage
        run: Rscript scripts/probe_bien_wol_attraction_coverage.R artifacts/orientation artifacts/coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bien-wol-attraction-coverage-probe
          path: artifacts/
          if-no-files-found: warn