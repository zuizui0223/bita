name: Harvest matched floral-study seeds

on:
  pull_request:
    paths:
      - "scripts/harvest_openalex_matched_flower_seeds.py"
      - "empirical/matched_flower_regime/literature_seed_queries.csv"
      - ".github/workflows/harvest-matched-flower-seeds.yml"
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Harvest metadata candidates from OpenAlex
        run: |
          python scripts/harvest_openalex_matched_flower_seeds.py \
            empirical/matched_flower_regime/literature_seed_queries.csv \
            artifacts/matched_flower_seed_harvest \
            --results-per-query 50 \
            --shortlist-per-route 15

      - uses: actions/upload-artifact@v4
        with:
          name: matched-flower-seed-harvest
          path: artifacts/matched_flower_seed_harvest/
          if-no-files-found: error
