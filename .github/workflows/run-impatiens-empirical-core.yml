name: Run Impatiens empirical core

# Recomputes aligned observational channel models and randomized treatment effects
# from the title-validated Dryad archive. Raw observations stay in memory; only
# aggregate diagnostics, audits, model reports, bounded readouts, and an aggregate
# channel-ledger figure are uploaded.

on:
  pull_request:
    paths:
      - "configs/impatiens_capensis_four_path_models.json"
      - "configs/impatiens_response_scale_models.json"
      - "configs/impatiens_randomized_fitness_models.json"
      - "empirical/four_path_effects/title_validated_dataset_targets.csv"
      - "scripts/audit_impatiens_four_path_data.py"
      - "scripts/extract_impatiens_variable_dictionary.py"
      - "scripts/run_impatiens_four_path_models.py"
      - "scripts/run_impatiens_response_scale_models.py"
      - "scripts/run_impatiens_randomized_fitness_models.py"
      - "scripts/build_impatiens_empirical_readout.py"
      - "scripts/build_impatiens_response_scale_readout.py"
      - "scripts/build_impatiens_factorial_fitness_readout.py"
      - "scripts/build_impatiens_theory_bridge.py"
      - "scripts/build_impatiens_channel_ledger_svg.py"
      - "trait_architecture/impatiens_models.py"
      - "trait_architecture/impatiens_empirical_readout.py"
      - "trait_architecture/impatiens_response_scale_models.py"
      - "trait_architecture/impatiens_response_scale_readout.py"
      - "trait_architecture/impatiens_factorial_fitness_models.py"
      - "trait_architecture/impatiens_factorial_fitness_readout.py"
      - "trait_architecture/impatiens_theory_bridge.py"
      - "trait_architecture/impatiens_channel_ledger_svg.py"
      - "trait_architecture/quasi_glm.py"
      - "trait_architecture/standardized_ols.py"
      - "trait_architecture/dryad_archive_schema.py"
      - "trait_architecture/title_validated_dryad_manifest.py"
      - "tests/test_impatiens_models.py"
      - "tests/test_impatiens_empirical_readout.py"
      - "tests/test_impatiens_response_scale_models.py"
      - "tests/test_impatiens_response_scale_readout.py"
      - "tests/test_impatiens_factorial_fitness_models.py"
      - "tests/test_impatiens_factorial_fitness_readout.py"
      - "tests/test_impatiens_theory_bridge.py"
      - "tests/test_impatiens_channel_ledger_svg.py"
      - "tests/test_quasi_glm.py"
      - ".github/workflows/run-impatiens-empirical-core.yml"
      - "docs/EMPIRICAL_PIVOT_IMPATIENS_V1.md"
      - "docs/IMPATIENS_MODEL_ADEQUACY_SENSITIVITY_V1.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test declared models and inference boundaries
        run: |
          python -m pytest -q \
            tests/test_impatiens_models.py \
            tests/test_impatiens_empirical_readout.py \
            tests/test_quasi_glm.py \
            tests/test_impatiens_response_scale_models.py \
            tests/test_impatiens_response_scale_readout.py \
            tests/test_impatiens_factorial_fitness_models.py \
            tests/test_impatiens_factorial_fitness_readout.py \
            tests/test_impatiens_theory_bridge.py \
            tests/test_impatiens_channel_ledger_svg.py

      - name: Audit raw observation structures and denominators
        run: |
          python scripts/audit_impatiens_four_path_data.py \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/impatiens_empirical_core

      - name: Recover documented variable definitions
        run: |
          python scripts/extract_impatiens_variable_dictionary.py \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/impatiens_empirical_core

      - name: Recompute original predeclared panel models
        run: |
          python scripts/run_impatiens_four_path_models.py \
            configs/impatiens_capensis_four_path_models.json \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/impatiens_empirical_core

      - name: Build original bounded empirical readout
        run: |
          python scripts/build_impatiens_empirical_readout.py \
            artifacts/impatiens_empirical_core/impatiens_four_path_model_report.json \
            artifacts/impatiens_empirical_core/IMPATIENS_EMPIRICAL_READOUT.md

      - name: Fit response-scale channel and seed models
        run: |
          python scripts/run_impatiens_response_scale_models.py \
            configs/impatiens_response_scale_models.json \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/impatiens_empirical_core

      - name: Build response-scale readout
        run: |
          python scripts/build_impatiens_response_scale_readout.py \
            artifacts/impatiens_empirical_core/impatiens_response_scale_model_report.json \
            artifacts/impatiens_empirical_core/IMPATIENS_RESPONSE_SCALE_READOUT.md

      - name: Fit randomized factorial fitness models
        run: |
          python scripts/run_impatiens_randomized_fitness_models.py \
            configs/impatiens_randomized_fitness_models.json \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/impatiens_empirical_core

      - name: Build randomized factorial fitness readout
        run: |
          python scripts/build_impatiens_factorial_fitness_readout.py \
            artifacts/impatiens_empirical_core/impatiens_randomized_fitness_model_report.json \
            artifacts/impatiens_empirical_core/IMPATIENS_RANDOMIZED_FITNESS_READOUT.md

      - name: Build theory-to-empirics bridge
        run: |
          python scripts/build_impatiens_theory_bridge.py \
            artifacts/impatiens_empirical_core/impatiens_response_scale_model_report.json \
            artifacts/impatiens_empirical_core/impatiens_randomized_fitness_model_report.json \
            artifacts/impatiens_empirical_core/IMPATIENS_THEORY_BRIDGE.md

      - name: Build empirical channel-ledger figure
        run: |
          python scripts/build_impatiens_channel_ledger_svg.py \
            artifacts/impatiens_empirical_core/impatiens_response_scale_model_report.json \
            artifacts/impatiens_empirical_core/impatiens_randomized_fitness_model_report.json \
            artifacts/impatiens_empirical_core/IMPATIENS_CHANNEL_LEDGER.svg

      - uses: actions/upload-artifact@v4
        with:
          name: impatiens-empirical-core
          path: artifacts/impatiens_empirical_core/
          if-no-files-found: error
