name: Resolve d_A candidate sources

# Reproducibly resolves each d_A candidate lead's DOI against Crossref, screens
# only registered PMC leads through exact Europe PMC full-text XML, and builds C4
# reading targets for any viable trait-intervention -> antagonist structure. Artefacts
# contain receipts and locators only; they never retain XML, extract effects, or
# declare a direct d_A route.

on:
  pull_request:
    paths:
      - "empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv"
      - "trait_architecture/d_a_source_resolver.py"
      - "trait_architecture/d_a_pmc_screen.py"
      - "trait_architecture/d_a_pmc_reading_targets.py"
      - "scripts/resolve_d_a_candidate_sources.py"
      - "scripts/screen_d_a_pmc_fulltext.py"
      - "scripts/build_d_a_pmc_c4_reading_targets.py"
      - "tests/test_d_a_source_resolver.py"
      - "tests/test_d_a_pmc_screen.py"
      - "tests/test_d_a_pmc_reading_targets.py"
      - ".github/workflows/resolve-d-a-candidate-sources.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Resolver, PMC screen, and C4-target tests (offline)
        run: |
          python -m pytest -q \
            tests/test_d_a_source_resolver.py \
            tests/test_d_a_pmc_screen.py \
            tests/test_d_a_pmc_reading_targets.py

      - name: Resolve candidate sources against Crossref
        run: |
          python scripts/resolve_d_a_candidate_sources.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_source_receipts \
            --mailto actions@users.noreply.github.com

      - name: Screen registered PMC full-text XML for d_A route feasibility
        run: |
          python scripts/screen_d_a_pmc_fulltext.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_pmc_fulltext_screen

      - name: Build C4 targets for viable PMC d_A candidates
        run: |
          python scripts/build_d_a_pmc_c4_reading_targets.py \
            artifacts/d_a_pmc_fulltext_screen/d_a_pmc_fulltext_screen.csv \
            artifacts/d_a_pmc_c4_reading_targets

      - uses: actions/upload-artifact@v4
        with:
          name: d-a-source-receipts
          path: |
            artifacts/d_a_source_receipts/
            artifacts/d_a_pmc_fulltext_screen/
            artifacts/d_a_pmc_c4_reading_targets/
          if-no-files-found: error
