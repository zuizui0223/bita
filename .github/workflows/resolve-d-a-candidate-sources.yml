name: Resolve d_A candidate sources

# Reproducibly resolves registered d_A leads, screens only registered PMC leads
# through exact Europe PMC XML, builds C4 targets for viable visual/display leads,
# and probes/screens the fixed eLife scent/reward lead plus declared figure data
# assets. Artefacts contain receipts, locators, bounded visual previews, and
# structured C4 context signals only; they never retain full text or datasets,
# digitize figures, extract effects, or declare a direct d_A route.

on:
  pull_request:
    paths:
      - "empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv"
      - "trait_architecture/d_a_source_resolver.py"
      - "trait_architecture/d_a_pmc_screen.py"
      - "trait_architecture/d_a_pmc_reading_targets.py"
      - "trait_architecture/d_a_pmc_c4_context.py"
      - "trait_architecture/d_a_elife_probe.py"
      - "trait_architecture/d_a_elife_screen.py"
      - "trait_architecture/d_a_elife_asset_locator.py"
      - "trait_architecture/d_a_elife_figure_preview.py"
      - "trait_architecture/d_a_elife_c4_context.py"
      - "scripts/resolve_d_a_candidate_sources.py"
      - "scripts/screen_d_a_pmc_fulltext.py"
      - "scripts/build_d_a_pmc_c4_reading_targets.py"
      - "scripts/assess_d_a_pmc_c4_context.py"
      - "scripts/probe_d_a_elife_source.py"
      - "scripts/screen_d_a_elife_xml.py"
      - "scripts/locate_d_a_elife_assets.py"
      - "scripts/render_d_a_elife_figure_previews.py"
      - "scripts/assess_d_a_elife_c4_context.py"
      - "tests/test_d_a_source_resolver.py"
      - "tests/test_d_a_pmc_screen.py"
      - "tests/test_d_a_pmc_reading_targets.py"
      - "tests/test_d_a_pmc_c4_context.py"
      - "tests/test_d_a_elife_probe.py"
      - "tests/test_d_a_elife_screen.py"
      - "tests/test_d_a_elife_asset_locator.py"
      - "tests/test_d_a_elife_figure_preview.py"
      - "tests/test_d_a_elife_c4_context.py"
      - ".github/workflows/resolve-d-a-candidate-sources.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Resolver, PMC, eLife, asset-locator, preview, and C4 tests (offline)
        run: |
          python -m pytest -q \
            tests/test_d_a_source_resolver.py \
            tests/test_d_a_pmc_screen.py \
            tests/test_d_a_pmc_reading_targets.py \
            tests/test_d_a_pmc_c4_context.py \
            tests/test_d_a_elife_probe.py \
            tests/test_d_a_elife_screen.py \
            tests/test_d_a_elife_asset_locator.py \
            tests/test_d_a_elife_figure_preview.py \
            tests/test_d_a_elife_c4_context.py

      - name: Resolve candidate sources against Crossref
        run: |
          python scripts/resolve_d_a_candidate_sources.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_source_receipts \
            --mailto actions@users.noreply.github.com

      - name: Screen registered PMC full-text XML for d_A route feasibility
        run: |
          python scripts/screen_d_a_pmc_fulltext.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_pmc_fulltext_screen

      - name: Build C4 targets for viable PMC d_A candidates
        run: |
          python scripts/build_d_a_pmc_c4_reading_targets.py \
            artifacts/d_a_pmc_fulltext_screen/d_a_pmc_fulltext_screen.csv \
            artifacts/d_a_pmc_c4_reading_targets

      - name: Assess required PMC C4 context without extracting an effect
        run: |
          python scripts/assess_d_a_pmc_c4_context.py \
            artifacts/d_a_pmc_fulltext_screen/d_a_pmc_fulltext_screen.csv \
            artifacts/d_a_pmc_c4_context

      - name: Probe registered eLife scent reward source
        run: |
          python scripts/probe_d_a_elife_source.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_elife_source_probe \
            --mailto actions@users.noreply.github.com

      - name: Screen public eLife XML for scent reward route structure
        run: |
          python scripts/screen_d_a_elife_xml.py \
            artifacts/d_a_elife_source_probe/d_a_elife_source_probe.csv \
            artifacts/d_a_elife_xml_screen

      - name: Locate declared eLife C4 figure data assets
        run: |
          python scripts/locate_d_a_elife_assets.py \
            artifacts/d_a_elife_xml_screen/d_a_elife_xml_screen.csv \
            artifacts/d_a_elife_assets

      - name: Render bounded C4 previews for primary eLife figures
        run: |
          python scripts/render_d_a_elife_figure_previews.py \
            artifacts/d_a_elife_assets/d_a_elife_asset_receipts.csv \
            artifacts/d_a_elife_figure_previews

      - name: Assess required eLife C4 context without extracting an effect
        run: |
          python scripts/assess_d_a_elife_c4_context.py \
            artifacts/d_a_elife_source_probe/d_a_elife_source_probe.csv \
            artifacts/d_a_elife_c4_context

      - uses: actions/upload-artifact@v4
        with:
          name: d-a-source-receipts
          path: |
            artifacts/d_a_source_receipts/
            artifacts/d_a_pmc_fulltext_screen/
            artifacts/d_a_pmc_c4_reading_targets/
            artifacts/d_a_pmc_c4_context/
            artifacts/d_a_elife_source_probe/
            artifacts/d_a_elife_xml_screen/
            artifacts/d_a_elife_assets/
            artifacts/d_a_elife_figure_previews/
            artifacts/d_a_elife_c4_context/
          if-no-files-found: error
