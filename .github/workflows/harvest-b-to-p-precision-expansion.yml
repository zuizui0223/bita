name: Harvest B to P precision expansion

on:
  pull_request:
    paths:
      - "empirical/broad_reality_evidence/precision_expansions/**"
      - "trait_architecture/broad_reality_evidence.py"
      - "trait_architecture/broad_reality_screen.py"
      - "trait_architecture/broad_source_screening.py"
      - "trait_architecture/broad_calibration_batch.py"
      - "trait_architecture/broad_calibration_abstracts.py"
      - "scripts/harvest_broad_reality_evidence.py"
      - "scripts/screen_broad_reality_evidence.py"
      - "scripts/build_broad_source_screening_matrix.py"
      - "scripts/build_broad_calibration_batch.py"
      - "scripts/build_broad_calibration_abstract_packet.py"
      - ".github/workflows/harvest-b-to-p-precision-expansion.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Harvest B-to-P precision candidates
        run: |
          python scripts/harvest_broad_reality_evidence.py \
            empirical/broad_reality_evidence/precision_expansions/B_TO_P_PRECISION_QUERY_REGISTRY_v1.csv \
            artifacts/b_to_p_precision_expansion \
            --rows-per-query 150

      - name: Screen precision candidates
        run: |
          python scripts/screen_broad_reality_evidence.py \
            artifacts/b_to_p_precision_expansion/broad_reality_evidence_candidates.csv \
            artifacts/b_to_p_precision_expansion

      - name: Build source-screening matrix
        run: |
          python scripts/build_broad_source_screening_matrix.py \
            artifacts/b_to_p_precision_expansion/broad_reality_evidence_priority.csv \
            artifacts/b_to_p_precision_expansion/broad_source_screening_matrix.csv

      - name: Select B-to-P calibration packet
        run: |
          python scripts/build_broad_calibration_batch.py \
            artifacts/b_to_p_precision_expansion/broad_reality_evidence_priority.csv \
            artifacts/b_to_p_precision_expansion/broad_calibration_batch.csv \
            --per-route 20

      - name: Retrieve abstract source packet
        run: |
          python scripts/build_broad_calibration_abstract_packet.py \
            artifacts/b_to_p_precision_expansion/broad_calibration_batch.csv \
            artifacts/b_to_p_precision_expansion/broad_calibration_abstract_packet.csv

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: b-to-p-precision-expansion
          path: artifacts/b_to_p_precision_expansion/
          if-no-files-found: warn
