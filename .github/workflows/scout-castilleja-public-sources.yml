name: Scout Castilleja public sources

on:
  pull_request:
    paths:
      - "trait_architecture/public_article_source_scout.py"
      - "trait_architecture/castilleja_access_probe.py"
      - "scripts/scout_castilleja_public_sources.py"
      - "scripts/probe_castilleja_source_access.py"
      - "tests/test_public_article_source_scout.py"
      - "tests/test_castilleja_access_probe.py"
      - ".github/workflows/scout-castilleja-public-sources.yml"
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Scout public source metadata without downloading article tables
        run: python scripts/scout_castilleja_public_sources.py

      - name: Verify public PDF access and Dryad candidate provenance
        run: |
          mkdir -p artifacts/castilleja_access_probe
          set +e
          python scripts/probe_castilleja_source_access.py \
            > artifacts/castilleja_access_probe/probe_stdout.log \
            2> artifacts/castilleja_access_probe/probe_stderr.log
          status=$?
          echo "$status" > artifacts/castilleja_access_probe/probe_exit_status.txt
          cat artifacts/castilleja_access_probe/probe_stdout.log
          cat artifacts/castilleja_access_probe/probe_stderr.log >&2
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: castilleja-public-source-scout
          path: artifacts/castilleja_public_sources/
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: castilleja-source-access-probe
          path: artifacts/castilleja_access_probe/
          if-no-files-found: warn
