name: Collect Route 1 metadata candidates

on:
  workflow_dispatch:
    inputs:
      rows_per_query:
        description: "Crossref rows to request per query (1-100)"
        required: true
        default: "25"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set requested batch size
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          path = Path('empirical/megachile_leaf_resource/meta_analysis/route1_queries.csv')
          rows = os.environ['ROWS']
          text = path.read_text(encoding='utf-8').splitlines()
          header, *body = text
          updated = [header]
          for line in body:
              fields = line.rsplit(',', 1)
              updated.append(f'{fields[0]},{rows}')
          path.write_text('\n'.join(updated) + '\n', encoding='utf-8')
          PY
        env:
          ROWS: ${{ inputs.rows_per_query }}
      - name: Collect Crossref metadata
        run: |
          python empirical/megachile_leaf_resource/meta_analysis/collect_route1_candidates.py \
            empirical/megachile_leaf_resource/meta_analysis/route1_queries.csv \
            route1_candidates.csv
      - uses: actions/upload-artifact@v4
        with:
          name: route1-crossref-candidates
          path: route1_candidates.csv
