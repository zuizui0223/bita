name: Probe d_A Caruso primary-study index

# Caruso 2019 is a system-seeding meta-analysis, not a d_A effect source. This
# workflow finds public index routes, checks the explicitly related Dryad record's
# metadata and manifest, then reads only the schema of an exact capped XLSX candidate.
# It ends with a route readout that distinguishes missing headers from public-file
# access blocks. It never retains data rows, extracts primary-study rows, or writes an
# effect table.

on:
  pull_request:
    paths:
      - "trait_architecture/d_a_caruso_index_probe.py"
      - "trait_architecture/d_a_caruso_dryad_manifest.py"
      - "trait_architecture/d_a_caruso_xlsx_schema.py"
      - "trait_architecture/d_a_caruso_index_readout.py"
      - "scripts/probe_d_a_caruso_primary_index.py"
      - "scripts/probe_d_a_caruso_dryad_manifest.py"
      - "scripts/inspect_d_a_caruso_xlsx_schema.py"
      - "scripts/read_d_a_caruso_index_route.py"
      - "tests/test_d_a_caruso_index_probe.py"
      - "tests/test_d_a_caruso_dryad_manifest.py"
      - "tests/test_d_a_caruso_xlsx_schema.py"
      - "tests/test_d_a_caruso_index_readout.py"
      - ".github/workflows/probe-d-a-caruso-primary-index.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test bounded index, manifest, schema, and route-readout stages
        run: |
          python -m pytest -q \
            tests/test_d_a_caruso_index_probe.py \
            tests/test_d_a_caruso_dryad_manifest.py \
            tests/test_d_a_caruso_xlsx_schema.py \
            tests/test_d_a_caruso_index_readout.py

      - name: Probe public metadata routes
        run: |
          python scripts/probe_d_a_caruso_primary_index.py \
            artifacts/d_a_caruso_index_probe \
            --mailto actions@users.noreply.github.com

      - name: Inspect Dryad metadata and file manifest only
        run: |
          python scripts/probe_d_a_caruso_dryad_manifest.py \
            artifacts/d_a_caruso_dryad_manifest

      - name: Inspect capped XLSX schema only
        run: |
          python scripts/inspect_d_a_caruso_xlsx_schema.py \
            artifacts/d_a_caruso_dryad_manifest/d_a_caruso_dryad_manifest.csv \
            artifacts/d_a_caruso_xlsx_schema

      - name: Classify final index-route outcome
        run: |
          python scripts/read_d_a_caruso_index_route.py \
            artifacts/d_a_caruso_dryad_manifest/d_a_caruso_dryad_manifest.csv \
            artifacts/d_a_caruso_xlsx_schema/d_a_caruso_xlsx_schema.csv \
            artifacts/d_a_caruso_index_readout

      - uses: actions/upload-artifact@v4
        with:
          name: d-a-caruso-index-probe
          path: |
            artifacts/d_a_caruso_index_probe/
            artifacts/d_a_caruso_dryad_manifest/
            artifacts/d_a_caruso_xlsx_schema/
            artifacts/d_a_caruso_index_readout/
          if-no-files-found: error
