name: Screen d_A Trollius route

# This workflow performs a fixed-source C3/C4 feasibility screen only. It resolves
# the registered Trollius DOI to Europe PMC and, only when a PMCID is public, records
# heading/table locators from public full-text XML. It never writes an effect row.

on:
  pull_request:
    paths:
      - "trait_architecture/d_a_trollius_pmc_probe.py"
      - "trait_architecture/d_a_pmc_screen.py"
      - "scripts/probe_d_a_trollius_pmc.py"
      - "tests/test_d_a_trollius_pmc_probe.py"
      - "empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv"
      - ".github/workflows/screen-d-a-trollius-route.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test Trollius bounded route screen
        run: python -m pytest -q tests/test_d_a_trollius_pmc_probe.py

      - name: Resolve public PMC route and screen headings
        run: |
          python scripts/probe_d_a_trollius_pmc.py \
            empirical/broad_reality_evidence/d_A_candidate_scouting_v1.csv \
            artifacts/d_a_trollius_pmc_probe

      - uses: actions/upload-artifact@v4
        with:
          name: d-a-trollius-pmc-probe
          path: artifacts/d_a_trollius_pmc_probe/
          if-no-files-found: error
