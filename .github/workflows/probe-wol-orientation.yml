name: Probe Web of Life taxonomic orientation

on:
  pull_request:
    paths:
      - "scripts/probe_wol_orientation.py"
      - ".github/workflows/probe-wol-orientation.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Probe plant-animal orientation
        run: python scripts/probe_wol_orientation.py artifacts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-of-life-orientation-probe
          path: artifacts/
          if-no-files-found: warn
