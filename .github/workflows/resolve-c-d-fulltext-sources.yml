name: Resolve c_D full-text sources

# Resolves the fixed chemical-barrier c_D reading queue against Crossref, scouts
# DOI-exact OpenAlex/Unpaywall/repository routes, then performs bounded public-PDF
# page-location probes. Artefacts contain receipts and page locators only: no article
# PDFs/text, effects, dose classifications, or B2 eligibility decisions are stored.

on:
  pull_request:
    paths:
      - "empirical/broad_reality_evidence/precision_expansions/fulltext/B_TO_P_FULLTEXT_READING_QUEUE_v1.csv"
      - "trait_architecture/c_d_source_resolution.py"
      - "trait_architecture/c_d_fulltext_locator.py"
      - "trait_architecture/c_d_public_source_scout.py"
      - "trait_architecture/d_a_source_resolver.py"
      - "trait_architecture/public_article_source_scout.py"
      - "trait_architecture/public_repository_resolver.py"
      - "scripts/resolve_c_d_fulltext_sources.py"
      - "scripts/locate_c_d_fulltext_pages.py"
      - "scripts/scout_c_d_public_sources.py"
      - "scripts/locate_c_d_public_source_pages.py"
      - "tests/test_c_d_source_resolution.py"
      - "tests/test_c_d_fulltext_locator.py"
      - "tests/test_c_d_public_source_scout.py"
      - ".github/workflows/resolve-c-d-fulltext-sources.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]" pypdf

      - name: Resolver, source-scout, and locator tests (offline)
        run: |
          python -m pytest -q \
            tests/test_c_d_source_resolution.py \
            tests/test_c_d_public_source_scout.py \
            tests/test_c_d_fulltext_locator.py

      - name: Resolve c_D source routes against Crossref
        run: |
          python scripts/resolve_c_d_fulltext_sources.py \
            empirical/broad_reality_evidence/precision_expansions/fulltext/B_TO_P_FULLTEXT_READING_QUEUE_v1.csv \
            artifacts/c_d_source_receipts \
            --mailto actions@users.noreply.github.com

      - name: Scout DOI-exact OpenAlex, Unpaywall, and repository source routes
        run: |
          python scripts/scout_c_d_public_sources.py \
            empirical/broad_reality_evidence/precision_expansions/fulltext/B_TO_P_FULLTEXT_READING_QUEUE_v1.csv \
            artifacts/c_d_public_sources \
            --unpaywall-email actions@users.noreply.github.com

      - name: Locate publisher-advertised PDF dose and outcome pages
        run: |
          python scripts/locate_c_d_fulltext_pages.py \
            artifacts/c_d_source_receipts/c_d_fulltext_source_receipts.csv \
            artifacts/c_d_source_receipts/c_d_fulltext_page_locators.csv

      - name: Locate DOI-exact public-PDF dose and outcome pages
        run: |
          python scripts/locate_c_d_public_source_pages.py \
            artifacts/c_d_public_sources/c_d_public_source_receipts.csv \
            artifacts/c_d_public_sources/c_d_public_source_page_locators.csv

      - uses: actions/upload-artifact@v4
        with:
          name: c-d-source-receipts
          path: |
            artifacts/c_d_source_receipts/
            artifacts/c_d_public_sources/
          if-no-files-found: error
