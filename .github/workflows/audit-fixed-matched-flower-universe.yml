name: Audit fixed matched-flower candidate universe

on:
  pull_request:
    paths:
      - "trait_architecture/fixed_candidate_universe.py"
      - "trait_architecture/candidate_universe_public_audit.py"
      - "trait_architecture/high_information_access_probe.py"
      - "scripts/audit_fixed_matched_flower_universe.py"
      - "scripts/probe_high_information_candidate_access.py"
      - "tests/test_fixed_candidate_universe.py"
      - "tests/test_candidate_universe_public_audit.py"
      - "tests/test_high_information_access_probe.py"
      - ".github/workflows/audit-fixed-matched-flower-universe.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Audit all fixed M0 candidates without reading article tables
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/fixed_258_public_routes
          set +e
          python scripts/audit_fixed_matched_flower_universe.py \
            artifacts/fixed_258_public_routes \
            --workers 8 \
            > artifacts/fixed_258_public_routes/audit_stdout.log \
            2> artifacts/fixed_258_public_routes/audit_stderr.log
          status=$?
          echo "$status" > artifacts/fixed_258_public_routes/audit_exit_status.txt
          cat artifacts/fixed_258_public_routes/audit_stdout.log
          cat artifacts/fixed_258_public_routes/audit_stderr.log >&2
          exit "$status"

      - name: Verify high-information public content routes and manifest identity
        run: |
          set +e
          python scripts/probe_high_information_candidate_access.py \
            artifacts/fixed_258_public_routes \
            --workers 6 \
            > artifacts/fixed_258_public_routes/access_probe_stdout.log \
            2> artifacts/fixed_258_public_routes/access_probe_stderr.log
          status=$?
          echo "$status" > artifacts/fixed_258_public_routes/access_probe_exit_status.txt
          cat artifacts/fixed_258_public_routes/access_probe_stdout.log
          cat artifacts/fixed_258_public_routes/access_probe_stderr.log >&2
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fixed-258-public-route-audit
          path: artifacts/fixed_258_public_routes/
          if-no-files-found: warn
