name: Audit Dalechampia linked panel

on:
  pull_request:
    paths:
      - "trait_architecture/dalechampia_linked_panel.py"
      - "trait_architecture/dalechampia_package_documentation.py"
      - "scripts/audit_dalechampia_linked_panel.py"
      - "scripts/inspect_dalechampia_package_documentation.py"
      - "tests/test_dalechampia_linked_panel.py"
      - "tests/test_dalechampia_package_documentation.py"
      - ".github/workflows/audit-dalechampia-linked-panel.yml"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Audit public linked package without retaining observations
        run: |
          python scripts/audit_dalechampia_linked_panel.py \
            10.1111/j.1600-0706.2013.20780.x \
            10.5061/dryad.0k6djh9xx \
            artifacts/dalechampia_linked_panel

      - name: Inspect name-whitelisted package documentation
        run: |
          python scripts/inspect_dalechampia_package_documentation.py \
            10.5061/dryad.0k6djh9xx \
            artifacts/dalechampia_linked_panel

      - uses: actions/upload-artifact@v4
        with:
          name: dalechampia-linked-panel-audit
          path: artifacts/dalechampia_linked_panel/
          if-no-files-found: error
