name: submission-scope

on:
  pull_request:
  push:
    branches: [main]

jobs:
  submission-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Guard current submission scope
        run: python -m pytest -q tests/test_submission_scope.py
