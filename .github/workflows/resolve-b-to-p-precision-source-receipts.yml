name: Resolve B to P precision source receipts

on:
  pull_request:
    paths:
      - "trait_architecture/public_repository_resolver.py"
      - "scripts/resolve_public_repository_receipts.py"
      - "empirical/broad_reality_evidence/precision_expansions/source_audits/B_TO_P_BATCH_1_PUBLIC_SOURCE_QUEUE.csv"
      - ".github/workflows/resolve-b-to-p-precision-source-receipts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Resolve public repository receipts
        run: |
          mkdir -p artifacts/b_to_p_precision_source_receipts
          set +e
          python scripts/resolve_public_repository_receipts.py \
            empirical/broad_reality_evidence/precision_expansions/source_audits/B_TO_P_BATCH_1_PUBLIC_SOURCE_QUEUE.csv \
            artifacts/b_to_p_precision_source_receipts \
            > artifacts/b_to_p_precision_source_receipts/resolver_stdout.log \
            2> artifacts/b_to_p_precision_source_receipts/resolver_stderr.log
          status=$?
          echo "$status" > artifacts/b_to_p_precision_source_receipts/resolver_exit_status.txt
          cat artifacts/b_to_p_precision_source_receipts/resolver_stdout.log
          cat artifacts/b_to_p_precision_source_receipts/resolver_stderr.log >&2
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: b-to-p-precision-source-receipts
          path: artifacts/b_to_p_precision_source_receipts/
          if-no-files-found: warn
