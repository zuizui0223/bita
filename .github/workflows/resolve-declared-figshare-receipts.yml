name: Resolve declared Figshare source receipts

on:
  pull_request:
    paths:
      - "trait_architecture/declared_figshare_receipts.py"
      - "scripts/resolve_declared_figshare_receipts.py"
      - "tests/test_declared_figshare_receipts.py"
      - "empirical/matched_flower_regime/declared_figshare_source_queue.csv"
      - ".github/workflows/resolve-declared-figshare-receipts.yml"
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Resolve exact article-declared Figshare accessions
        run: |
          python scripts/resolve_declared_figshare_receipts.py \
            empirical/matched_flower_regime/declared_figshare_source_queue.csv \
            artifacts/declared_figshare_receipts

      - uses: actions/upload-artifact@v4
        with:
          name: declared-figshare-source-receipts
          path: artifacts/declared_figshare_receipts/
          if-no-files-found: error
