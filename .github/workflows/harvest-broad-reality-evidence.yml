name: Harvest broad reality evidence

on:
  pull_request:
    paths:
      - "trait_architecture/broad_reality_evidence.py"
      - "trait_architecture/broad_reality_deep.py"
      - "trait_architecture/broad_reality_screen.py"
      - "trait_architecture/priority_leak_audit.py"
      - "trait_architecture/priority_leak_audit_abstracts.py"
      - "trait_architecture/priority_leak_audit_adjudication.py"
      - "trait_architecture/priority_leak_audit_overlay.py"
      - "trait_architecture/broad_source_screening.py"
      - "trait_architecture/broad_calibration_batch.py"
      - "trait_architecture/broad_calibration_abstracts.py"
      - "trait_architecture/broad_meta_analysis.py"
      - "trait_architecture/hierarchical_evidence_synthesis.py"
      - "scripts/harvest_broad_reality_evidence.py"
      - "scripts/harvest_broad_reality_evidence_paged.py"
      - "scripts/screen_broad_reality_evidence.py"
      - "scripts/build_priority_leak_audit.py"
      - "scripts/build_priority_leak_audit_abstract_packet.py"
      - "scripts/build_priority_leak_audit_coding_sheet.py"
      - "scripts/summarize_priority_leak_audit.py"
      - "scripts/apply_priority_leak_audit_decisions.py"
      - "scripts/validate_priority_leak_audit_adjudication_snapshot.py"
      - "scripts/build_broad_source_screening_matrix.py"
      - "scripts/build_broad_calibration_batch.py"
      - "scripts/build_broad_calibration_abstract_packet.py"
      - "scripts/run_broad_meta_analysis.py"
      - "scripts/build_hierarchical_evidence_synthesis.py"
      - "tests/test_broad_reality_evidence.py"
      - "tests/test_broad_reality_deep.py"
      - "tests/test_priority_leak_audit.py"
      - "tests/test_priority_leak_audit_abstracts.py"
      - "tests/test_priority_leak_audit_adjudication.py"
      - "tests/test_priority_leak_audit_overlay.py"
      - "tests/test_priority_leak_audit_abstract_adjudication.py"
      - "tests/test_broad_reality_screen.py"
      - "tests/test_broad_source_screening.py"
      - "tests/test_broad_calibration_batch.py"
      - "tests/test_broad_calibration_abstracts.py"
      - "tests/test_broad_meta_analysis.py"
      - "tests/test_hierarchical_evidence_synthesis.py"
      - "empirical/broad_reality_evidence/**"
      - ".github/workflows/harvest-broad-reality-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Build paged Crossref evidence corpus
        run: |
          python scripts/harvest_broad_reality_evidence_paged.py \
            empirical/broad_reality_evidence/broad_evidence_query_registry.csv \
            artifacts/broad_reality_evidence \
            --rows-per-query 2000
      - name: Create metadata-only shallow-screen cohort
        run: |
          python scripts/screen_broad_reality_evidence.py \
            artifacts/broad_reality_evidence/broad_reality_evidence_candidates.csv \
            artifacts/broad_reality_evidence
      - name: Build current priority leakage audit queue
        run: |
          python scripts/build_priority_leak_audit.py \
            artifacts/broad_reality_evidence/broad_reality_evidence_screened.csv \
            artifacts/broad_reality_evidence/priority_leak_audit \
            --per-route-per-group 30
      - name: Retrieve Crossref abstracts for current priority leakage audit
        run: |
          python scripts/build_priority_leak_audit_abstract_packet.py \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_queue.csv \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_abstract_packet.csv
      - name: Build current priority-leak audit coding sheet
        run: |
          python scripts/build_priority_leak_audit_coding_sheet.py \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_abstract_packet.csv \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_coding_sheet.csv
      - name: Summarize current priority-leak audit coding state
        run: |
          python scripts/summarize_priority_leak_audit.py \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_abstract_packet.csv \
            artifacts/broad_reality_evidence/priority_leak_audit/priority_leak_audit_coding_sheet.csv \
            artifacts/broad_reality_evidence/priority_leak_audit
      - name: Build source-screening matrix for the priority cohort
        run: |
          python scripts/build_broad_source_screening_matrix.py \
            artifacts/broad_reality_evidence/broad_reality_evidence_priority.csv \
            artifacts/broad_reality_evidence/broad_source_screening_matrix.csv
      - name: Select route-balanced calibration batch
        run: |
          python scripts/build_broad_calibration_batch.py \
            artifacts/broad_reality_evidence/broad_reality_evidence_priority.csv \
            artifacts/broad_reality_evidence/broad_calibration_batch.csv \
            --per-route 10
      - name: Retrieve Crossref abstracts for calibration source screening
        run: |
          python scripts/build_broad_calibration_abstract_packet.py \
            artifacts/broad_reality_evidence/broad_calibration_batch.csv \
            artifacts/broad_reality_evidence/broad_calibration_abstract_packet.csv
      - name: Validate empty-to-populated broad meta-analysis pipeline
        run: |
          python scripts/run_broad_meta_analysis.py \
            empirical/broad_reality_evidence/broad_route_records.csv \
            empirical/broad_reality_evidence/broad_effect_extractions.csv \
            empirical/broad_reality_evidence/broad_meta_analysis_strata.csv \
            artifacts/broad_meta_analysis
      - name: Build hierarchical evidence synthesis
        run: |
          python scripts/build_hierarchical_evidence_synthesis.py \
            artifacts/broad_reality_evidence/broad_reality_evidence_candidates.csv \
            artifacts/broad_reality_evidence/broad_reality_evidence_screened.csv \
            empirical/broad_reality_evidence/priority_leak_audit/priority_leak_audit_yield_v1.csv \
            empirical/broad_reality_evidence/broad_route_records.csv \
            empirical/broad_reality_evidence/broad_effect_extractions.csv \
            empirical/broad_reality_evidence/precision_expansions/fulltext/B_TO_P_FULLTEXT_READING_QUEUE_v1.csv \
            artifacts/hierarchical_evidence_synthesis
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: broad-reality-evidence-corpus
          path: |
            artifacts/broad_reality_evidence/
            artifacts/broad_meta_analysis/
            artifacts/hierarchical_evidence_synthesis/
          if-no-files-found: warn
