name: Part B integrity guard

# Enforces the honesty boundary on the retained verified Part B effect table.
# Candidate-scouting and moderator-coding queues are intentionally absent from
# the submission supplement and are not CI inputs.

on:
  pull_request:
    paths:
      - "empirical/broad_reality_evidence/part_b_arrow_effects.csv"
      - "scripts/validate_part_b_integrity.py"
      - "tests/test_part_b_integrity.py"
      - ".github/workflows/part-b-integrity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Integrity guard tests
        run: python -m pytest -q tests/test_part_b_integrity.py

      - name: Run integrity guard on committed Part B effects
        run: |
          python scripts/validate_part_b_integrity.py \
            empirical/broad_reality_evidence/part_b_arrow_effects.csv
